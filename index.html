<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist - Compras da Semana</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="nav-bar">
        <div class="logo">quicklist</div>
    </header>

    <main class="container">
        <nav>
            <button class="btn-back"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
        </nav>

        <h1>Compras da semana</h1>

        <form id="add-form" class="input-group">
            <input type="text" id="item-name" placeholder="Adicione um novo item">
            <button type="submit" id="add-btn">Adicionar item</button>
        </form>

        <ul id="shopping-list">

            <li class="item-card">
                <div class="item-info">
                    <input type="checkbox" class="checkbox-custom">
                    <span class="text-item">Pão de forma</span>
                </div>
                <button class="btn-remove"><i class="far fa-trash-alt"></i></button>
            </li>

            <li class="item-card">
                <div class="item-info">
                    <input type="checkbox" class="checkbox-custom">
                    <span class="text-item">Café preto</span>
                </div>
                <button class="btn-remove"><i class="far fa-trash-alt"></i></button>
            </li>

            <li class="item-card">
                <div class="item-info">
                    <input type="checkbox" class="checkbox-custom">
                    <span class="text-item">Suco de laranja</span>
                </div>
                <button class="btn-remove"><i class="far fa-trash-alt"></i></button>
            </li>

            <li class="item-card">
                <div class="item-info">
                    <input type="checkbox" class="checkbox-custom">
                    <span class="text-item">Bolacha</span>
                </div>
                <button class="btn-remove"><i class="far fa-trash-alt"></i></button>
            </li>
        </ul>
    </main>

    <div id="alert-footer" class="alert-box hidden">
        <div class="alert-content">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>O item foi removido da lista</span>
        </div>
        <button id="close-alert"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <script src="./script.js"></script>
</body>
</html>
